name: Daily Weather Bot

on:
  schedule:
    # 每天台灣時間 08:00 (UTC 00:00) 執行
    - cron: '0 0 * * *'
  workflow_dispatch: # 保留手動按鈕供測試

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # 順便幫你更新到 v4，解決那個黃色警告

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run script
        env:
          CWA_TOKEN: ${{ secrets.CWA_TOKEN }}
          LINE_TOKEN: ${{ secrets.LINE_TOKEN }}
        run: python main.py